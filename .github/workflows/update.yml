name: update

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: update-packages
  cancel-in-progress: false

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  update:
    name: Update package metadata
    runs-on: ubuntu-latest
    container:
      image: archlinux@sha256:1047e6e7878d58e4ee47e1cd6459a32fab41246b0efc4109e11b7ef16f50b14d
    permissions:
      contents: write # Push the automated update branch.
      pull-requests: write # Open or update the automated package update PR.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install workflow dependencies
        run: pacman -Syu --noconfirm --needed base-devel curl git github-cli sudo

      - name: Configure makepkg user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Run package update scripts
        run: sudo -u builder ./update.sh

      - name: Create pull request
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: automated/update-packages
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No package metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add .
          git commit -m "Update package metadata"
          gh auth setup-git
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr view "$BRANCH_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Update package metadata" \
              --body 'Automated package metadata update from `./update.sh`.'
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "${GITHUB_REF_NAME}" \
              --head "$BRANCH_NAME" \
              --title "Update package metadata" \
              --body 'Automated package metadata update from `./update.sh`.'
          fi
